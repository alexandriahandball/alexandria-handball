<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alexandria Handball</title>

<style>
body{margin:0;font-family:Arial;background:#f4f6f9;}
header{background:linear-gradient(90deg,#ff6600,#1e3a8a);color:white;padding:25px;text-align:center;}
nav{background:#1e3a8a;padding:12px;text-align:center;}
nav a{color:white;margin:0 10px;text-decoration:none;cursor:pointer;font-weight:bold;}
section{padding:25px;}
h2{color:#1e3a8a;}
.table{width:100%;border-collapse:collapse;background:white;}
.table th{background:#1e3a8a;color:white;}
.table th,.table td{padding:10px;border:1px solid #ddd;text-align:center;}
.hidden{display:none;}
footer{background:#1e3a8a;color:white;text-align:center;padding:15px;}
</style>
</head>

<body>

<header>
<h1>Alexandria Handball</h1>
<p>منطقة الإسكندرية لكرة اليد</p>
</header>

<nav>
<a onclick="show('about')">عن المنطقة</a>
<a onclick="show('tables')">الترتيب</a>
<a onclick="show('matches')">المباريات</a>
</nav>

<section id="about">
<h2>عن المنطقة</h2>
<p>تطوير كرة اليد بالإسكندرية وتنظيم البطولات لجميع الأعمار.</p>
</section>

<section id="tables" class="hidden">
<h2>جدول الترتيب</h2>
<table class="table" id="teamsTable">
<tr><th>المركز</th><th>الفريق</th><th>النقاط</th></tr>
</table>
</section>

<section id="matches" class="hidden">
<h2>المباريات</h2>
<table class="table" id="matchesTable">
<tr><th>الفريق</th><th>المنافس</th><th>النتيجة</th><th>التاريخ</th><th>الفئة</th></tr>
</table>
</section>

<footer>© 2026 Alexandria Handball</footer>

<script>

let matches = [];

function show(id){
document.querySelectorAll('section').forEach(s=>s.classList.add('hidden'));
document.getElementById(id).classList.remove('hidden');
}

// 🔥 ربط Google Sheets
fetch('https://docs.google.com/spreadsheets/d/e/2PACX-1vTCXs6_J0WI4khuPG-XLi0Jm4Xg0HKu6jincPkyQSoLme-BAPypkz5gepZfgGgur3oAMBSqsCyAl_G2/pub?output=csv')
.then(res => res.text())
.then(data => {

  let rows = data.split('\n').slice(1);

  rows.forEach(r => {
    let cols = r.split(',');

    matches.push({
      t1: cols[0],
      t2: cols[1],
      score: cols[2],
      date: cols[3],
      age: cols[4]
    });
  });

  render();
});

function render(){

// عرض المباريات
let mTable=document.getElementById('matchesTable');
mTable.innerHTML='<tr><th>الفريق</th><th>المنافس</th><th>النتيجة</th><th>التاريخ</th><th>الفئة</th></tr>';

matches.forEach(m=>{
let r=mTable.insertRow();
r.innerHTML=`<td>${m.t1}</td><td>${m.t2}</td><td>${m.score}</td><td>${m.date}</td><td>${m.age}</td>`;
});

// حساب الترتيب تلقائي 🔥
let teams = {};

matches.forEach(m=>{
let [s1,s2]=m.score.split('-').map(Number);

if(!teams[m.t1]) teams[m.t1]=0;
if(!teams[m.t2]) teams[m.t2]=0;

if(s1>s2){teams[m.t1]+=3;}
else if(s2>s1){teams[m.t2]+=3;}
else{teams[m.t1]+=1;teams[m.t2]+=1;}
});

let sorted = Object.entries(teams).sort((a,b)=>b[1]-a[1]);

let tTable=document.getElementById('teamsTable');
tTable.innerHTML='<tr><th>المركز</th><th>الفريق</th><th>النقاط</th></tr>';

sorted.forEach((t,i)=>{
let row=tTable.insertRow();
row.innerHTML=`<td>${i+1}</td><td>${t[0]}</td><td>${t[1]}</td>`;
});

}

</script>

</body>
</html>
